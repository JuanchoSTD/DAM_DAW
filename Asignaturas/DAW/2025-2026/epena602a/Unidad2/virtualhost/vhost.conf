<VirtualHost *:80>
        # Nombre del servidor
        ServerName endika-pyme.local
        ServerAlias www.endika-pyme.local

        RewriteEngine On
        # Redirigir todo el tráfico HTTP a HTTPS
        RewriteCond %{HTTPS} off
        RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]

</VirtualHost>

<VirtualHost *:443>
        # Nombre del servidor
        ServerName endika-pyme.local
        ServerAlias www.endika-pyme.local

        # Habilitar SSL en este virtual host
        SSLEngine on
        # Certificado publico y privado
        SSLCertificateFile /etc/apache2/ssl_certs/endika-pyme.local.crt
        SSLCertificateKeyFile /etc/apache2/ssl_certs/endika-pyme.local.key

        # Página de inicio por defecto
        DirectoryIndex index.html

        # Error document 404
        ErrorDocument 404 /404.html

        # Correo del administrador
        ServerAdmin endika@endikapenia.es

        # Carpeta o directorio donde se encuentra la web
        DocumentRoot /var/www/endika-pyme.local/html

        # Configuraciones para el directorio raiz
        <Directory "/var/www/endika-pyme.local/html">
                # Desactivar la opción de ver los archivos de un directorio
                # Desactivar la opción de seguir enlaces simbólicos
                Options -Indexes -FollowSymLinks

                # No Permite que exista un archivo .htaccess 
                # para reecribir reglas del servidor en este directorio
                AllowOverride None
        </Directory>

        # Zona privada con autenticación LDAP
        Alias /privado /var/www/endika-pyme.local/privado

        # Configuraciones para el directorio privado
        <Location /privado>
                # Autenticación básica con LDAP
                AuthType Basic
                AuthName "Usuario de LDAP o Apache LOCAL"
                AuthBasicProvider ldap file
                # Atributo del grupo LDAP que contiene los usuarios
                AuthLDAPGroupAttribute memberUid
                # Elimina la opción de user el DN completo del usuario para localizar usuarios pertenecientes a un grupo
                AuthLDAPGroupAttributeIsDN off
                # Rama del servidor LDAP donde están los usuarios
                AuthLDAPURL "ldap://127.0.0.1:389/ou=personas,dc=endika-pyme,dc=local?uid"
                # credenciales de un usuario con permiso de búsqueda en el LDAP
                AuthLDAPBindDN "cn=admin,dc=endika-pyme,dc=local"
                AuthLDAPBindPassword "12345678"

                # Archivo de contraseñas para usuarios locales como respaldo
                AuthUserFile /etc/apache2/htpasswd/endika-pyme.local
                # Requerir que el usuario pertenezca al grupo manager
                Require ldap-group cn=manager,ou=groups,dc=endika-pyme,dc=local
        </Location>

        Alias /confidencial /var/www/endika-pyme.local/confidencial

        # Configuraciones para el directorio confidencial
        <Directory "/var/www/endika-pyme.local/confidencial">
                # Autenticación básica con htpasswd
                AuthType Basic
                AuthName "Credenciales de acceso"
                AuthBasicProvider file

                # Archivo de contraseñas para usuarios locales
                AuthUserFile /etc/apache2/htpasswd/endika-pyme.local
                
                # Requerir que el usuario esté autenticado
                Require valid-user
        </Directory>

        # Forzar el tipo MIME para archivos de video
        <FilesMatch "\.(mp4)$">
                ForceType video/mp4
        </FilesMatch>

        <FilesMatch "\.(webm)$">
                ForceType video/webm
        </FilesMatch>

        # Configuración de paginas de error personalizadas
        ErrorDocument 401 /401.html
        ErrorDocument 403 /403.html
        ErrorDocument 404 /404.html

        # Configuración de logs con rotación semana se configura en segundos
        # 60 segundos x 60 minutos x 24 horas x 7 días = 604800 segundos
        ErrorLog "|/usr/bin/rotatelogs /var/www/endika-pyme.local/log/endika-pyme-error.log.%Y-%m-%d 604800"
        CustomLog "|/usr/bin/rotatelogs /var/www/endika-pyme.local/log/endika-pyme-access.log.%Y-%m-%d 604800" combined

</VirtualHost>